<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSP CEO Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: #1e293b; padding: 48px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .login-box h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #f8fafc; }
        .login-box p { font-size: 14px; color: #94a3b8; margin-bottom: 32px; }
        .login-box input { width: 100%; padding: 14px 16px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #f8fafc; font-size: 16px; outline: none; margin-bottom: 16px; }
        .login-box input:focus { border-color: #3b82f6; }
        .login-box button { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .login-box button:hover { background: #2563eb; }
        .error { color: #ef4444; font-size: 14px; margin-bottom: 16px; }
        .brand { font-size: 12px; color: #475569; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 24px; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="brand">Clinic Success Partners</div>
        <h1>CEO Dashboard</h1>
        <p>Private business intelligence</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
            <input type="password" name="password" placeholder="Password" autofocus>
            <button type="submit">Access Dashboard</button>
        </form>
    </div>
</body>
</html>
